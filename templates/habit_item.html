<li class="list-group-item d-flex flex-column flex-sm-row justify-content-between align-items-sm-center py-3">
    <div class="d-flex align-items-center">
        <!-- Кнопка закрепления привычки на Главной странице -->
        <form action="{{ url_for('toggle_pin', habit_id=habit.id) }}" method="POST" class="me-2 d-inline">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% if habit.is_pinned %}
                <button type="submit" class="btn btn-sm p-0 border-0 bg-transparent" title="Открепить привычку" style="font-size: 1.15rem; line-height: 1;">
                    📌
                </button>
            {% else %}
                <button type="submit" class="btn btn-sm p-0 border-0 bg-transparent text-muted" title="Закрепить привычку" style="font-size: 1.15rem; line-height: 1; opacity: 0.25; filter: grayscale(1);">
                    📌
                </button>
            {% endif %}
        </form>
        
        <div>
            <h5 class="mb-1 {% if habit.is_completed_today() %}text-decoration-line-through text-muted{% endif %}">
                {{ habit.name }}
            </h5>
            
            <div class="text-muted small">
                <span class="me-3">🔥 Серия: <strong class="text-warning">{{ habit.current_streak() }}</strong> дн.</span>
                <span>📊 Всего: <strong>{{ habit.total_completions() }}</strong></span>
            </div>
        </div>
    </div>
    
    <!-- Панель управления -->
    <div class="d-flex align-items-center mt-2 mt-sm-0 gap-2">
        {% if habit.is_completed_today() %}
        <button class="btn btn-sm btn-success"
                hx-post="/toggle/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML">
            ✓ Выполнено
        </button>
        {% else %}
        <button class="btn btn-sm btn-outline-primary"
                hx-post="/toggle/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML">
            Отметить
        </button>
        {% endif %}
        
        <button class="btn btn-sm btn-outline-danger"
                hx-delete="/delete/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML"
                hx-confirm="Вы уверены, что хотите удалить эту привычку?">
            Удалить
        </button>
    </div>
</li>
