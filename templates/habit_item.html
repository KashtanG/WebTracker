<li class="list-group-item d-flex flex-column flex-sm-row justify-content-between align-items-sm-center py-3">
    <div>
        <!-- Зачеркивание названия при выполнении сегодня -->
        <h5 class="mb-1 {% if habit.is_completed_today() %}text-decoration-line-through text-muted{% endif %}">
            {{ habit.name }}
        </h5>
        
        <!-- Вывод статистики -->
        <div class="text-muted small">
            <span class="me-3">🔥 Серия: <strong class="text-warning">{{ habit.current_streak() }}</strong> дн.</span>
            <span>📊 Всего: <strong>{{ habit.total_completions() }}</strong></span>
        </div>
    </div>
    
    <!-- Панель управления -->
    <div class="d-flex align-items-center mt-2 mt-sm-0 gap-2">
        {% if habit.is_completed_today() %}
        <button class="btn btn-sm btn-success"
                hx-post="/toggle/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML">
            ✓ Выполнено
        </button>
        {% else %}
        <button class="btn btn-sm btn-outline-primary"
                hx-post="/toggle/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML">
            Отметить
        </button>
        {% endif %}
        
        <button class="btn btn-sm btn-outline-danger"
                hx-delete="/delete/{{ habit.id }}"
                hx-target="closest li"
                hx-swap="outerHTML"
                hx-confirm="Вы уверены, что хотите удалить эту привычку?">
            Удалить
        </button>
    </div>
</li>
